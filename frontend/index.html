<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goblins y Mazmorras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-overlay">
        <div class="title-banner">
            <h1 class="game-title">Goblins y Mazmorras</h1>
            <div class="subtitle">Journey to the Inner Sanctum</div>
        </div>
        
        <div class="game-info">
            <div class="info-panel">
                <div class="panel-title">Quest Log</div>
                <div class="quest-text">Find the doors to breach the fortified walls</div>
            </div>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <!-- Event Chat Modal -->
    <div id="eventChatModal" class="chat-modal hidden">
        <div class="chat-container">
            <div class="chat-header">
                <h3>Game Master</h3>
                <button id="closeChatBtn" class="close-btn">×</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be added here dynamically -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="¿Qué haces?" maxlength="200">
                <button id="sendChatBtn">Enviar</button>
            </div>
            <div class="chat-loading hidden" id="chatLoading">
                <div class="loading-spinner"></div>
                <span>Evaluando tu acción...</span>
            </div>
        </div>
    </div>
    
    <div class="medieval-border top"></div>
    <div class="medieval-border bottom"></div>
    <div class="medieval-border left"></div>
    <div class="medieval-border right"></div>
    
    <script src="game.js"></script>
</body>
</html>
